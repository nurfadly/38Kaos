name: Build Strapi Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'cms/tigalapankaos-cms/src/**'
      - 'cms/tigalapankaos-cms/config/**'
      - 'cms/tigalapankaos-cms/public/**'
      - 'cms/tigalapankaos-cms/package.json'
      - '.github/workflows/build-cms.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: cms/tigalapankaos-cms
        run: npm install

      - name: Build Strapi admin panel
        working-directory: cms/tigalapankaos-cms
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NODE_ENV: production
        run: npm run build

      - name: Commit prebuilt admin panel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cms/tigalapankaos-cms/build
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild Strapi admin panel (automated)"
            git push
          fi
